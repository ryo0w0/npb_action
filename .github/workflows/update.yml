name: NPB Score Updater

on:
  # 試合時間帯（JST 12:00〜23:59）に相当するUTC時間で5分ごとに実行
  # UTC 03:00〜15:00 = JST 12:00〜24:00
  # オフシーズン（11月上旬〜3月下旬）はスクリプト側でスキップ
  schedule:
    - cron: '*/5 3-15 * * *'

  # 手動実行用
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Run scraper
        run: python scrape.py

      - name: Commit & push data/today.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/today.json
          git diff --cached --quiet || git commit -m "chore: update NPB scores $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')"
          git push
